<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AmneziaWG Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            overflow-x: hidden;
            position: relative;
        }

        .static-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0a0a0a;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
			font-size: 56px;
            font-weight: 800;
            color: #000000;
            -webkit-text-stroke: 2px #00ff64;
            text-stroke: 2px #00ff64;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            line-height: 0; 
        }

        .logo-image {
            width: 270px;
            height: auto;
            display: block;
            clip-path: inset(15% 0 15% 0);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 28px 24px;
            border: 1px solid rgba(0, 255, 100, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 100, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 255, 100, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 255, 100, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .card:active {
            transform: translateY(0);
        }

        .card-icon {
            font-size: 52px;
            margin-bottom: 16px;
            line-height: 1;
        }

        .flag-icon {
            width: 64px;
            height: 48px;
            margin-bottom: 16px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .flag-fi {
            background: linear-gradient(to bottom, 
                white 0%, white 15%, 
                #003580 15%, #003580 40%, 
                white 40%, white 60%, 
                #003580 60%, #003580 85%, 
                white 85%, white 100%);
            position: relative;
        }

        .flag-fi::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 30%;
            height: 100%;
            background: linear-gradient(to right, 
                transparent 0%, transparent 35%, 
                #003580 35%, #003580 65%, 
                transparent 65%, transparent 100%);
        }

        /* Флаг Нидерландов */
        .flag-nl {
            background: linear-gradient(to bottom, 
                #AE1C28 0%, #AE1C28 33.33%, 
                #FFFFFF 33.33%, #FFFFFF 66.66%, 
                #21468B 66.66%, #21468B 100%);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: #00ff64;
            margin-bottom: 12px;
        }

        .section-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #00ff64;
            margin: 20px 0 16px;
            letter-spacing: -0.5px;
            height: 40px;
            line-height: 40px;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 0 15px rgba(0, 255, 100, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .dynamic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }

        .card-button {
            width: 100%;
            max-width: 220px;
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.15), rgba(0, 212, 255, 0.15));
            border: 1px solid rgba(0, 255, 100, 0.3);
            border-radius: 16px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            color: #00ff64;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 20px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .card-button:hover {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.25), rgba(0, 212, 255, 0.25));
            border-color: #00ff64;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
        }

        .card-button:active {
            transform: scale(0.98);
        }

        .card-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button--loading {
            position: relative;
        }

        .button--loading .button__text {
            visibility: hidden;
        }

        .button--loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid #00ff64;
            border-top-color: transparent;
            border-radius: 50%;
            animation: buttonSpin 0.8s linear infinite;
        }

        @keyframes buttonSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            
            .logo {
                font-size: 32px;
                -webkit-text-stroke: 1.5px #00ff64;
            }
            
            .logo-image {
                width: 120px;
            }
            
            .card-title {
                font-size: 20px;
            }
            
            .section-title {
                font-size: 24px;
                margin: 18px 0 12px;
                height: 36px;
                line-height: 36px;
            }
            
            .card-button {
                max-width: 180px;
                padding: 10px 16px;
                font-size: 14px;
            }
            
            .flag-icon {
                width: 48px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="static-bg"></div>

    <div class="container">
        <div class="header">
            <div class="logo">AmneziaWG Генератор</div>
            <div class="logo-container">
                <img class="logo-image" src="https://warp-generator.github.io/logo.svg" alt="AmneziaWG Logo" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="section-title">Динамические конфигурации</div>
        <div class="dynamic-grid">
            <div class="card">
                <div class="card-icon">💻</div>
                <div class="card-title">Компьютер</div>
                <button id="generateButton1" class="card-button">
                    <span class="button__text">Сгенерировать</span>
                </button>
            </div>

            <div class="card">
                <div class="card-icon">📱</div>
                <div class="card-title">Телефон</div>
                <button id="generateButton2" class="card-button">
                    <span class="button__text">Сгенерировать</span>
                </button>
            </div>
        </div>

        <div class="section-title">Статические конфигурации</div>
        <div class="cards-grid">
            <div class="card" id="staticFI">
                <div class="flag-icon flag-fi"></div>
                <div class="card-title">Финляндия</div>
                <button class="card-button" onclick="event.stopPropagation(); downloadStaticConfig('FI')">
                    <span class="button__text">Скачать конфигурацию</span>
                </button>
            </div>

            <div class="card" id="staticNL">
                <div class="flag-icon flag-nl"></div>
                <div class="card-title">Нидерланды</div>
                <button class="card-button" onclick="event.stopPropagation(); downloadStaticConfig('NL')">
                    <span class="button__text">Скачать конфигурацию</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const STATIC_CONFIGS = {
            FI: `[Interface]
PrivateKey = aG1Lg0PM/8ebyFq9fQaOBIbaKIKRaOhBNp5rdoj9snM=
Address = 10.8.0.10/24
DNS = 1.1.1.1
Jc = 4
Jmin = 40
Jmax = 70
S1 = 97
S2 = 137
H1 = 206835555
H2 = 1798466344
H3 = 291743724
H4 = 2035958533

[Peer]
PublicKey = 0DyNEKF2bF9qNaZtUrwpJuJbVxRmEClyFoBzkIvd3VY=
PresharedKey = Qwr+6NoQ+zFApzdU7COx3aweQ+bzA9ctFkecRu9P9M8=
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 0
Endpoint = gw-fin1.itvhost.ru:51820`,

            NL: `[Interface]
PrivateKey = oJzIagN0oOvYGXFOg0vVvUqjfUr5o48LkC2DSk6ZzHs=
Address = 10.13.13.3/32
DNS = 1.1.1.1
Jc = 5
Jmin = 10
Jmax = 50
S1 = 58
S2 = 123
S3 = 27
S4 = 11
H1 = 402635029-1611840891
H2 = 2002448501-2133445208
H3 = 2138059656-2141120869
H4 = 2145854220-2147460034
I1 = <b 0x43dca842d5ce4b0ada2c2c85387ec57352ed17618729522cfd869089dde47b382b6d3e899ae6c03ee02ef4a60521cfa6c9ecafded21b7feca7f808c7f4905780>

[Peer]
PublicKey = YPMz5D0PZJUkCrPSoF9RkxylWOaEdh0hYwobeR/C3Sw=
PresharedKey = Kqbmra0ae404P9Y/QTvt6XmawaZ1xYVplSprlQMp47Y=
Endpoint = nl.prudenz.pro:51840
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25`
        };

        function getMoscowTimeString() {
            const now = new Date();
            const moscowTime = new Date(now.getTime() + (3 * 60 * 60 * 1000));
            const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
            const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
            return `${hours}_${minutes}`;
        }

        function downloadFile(content, fileName, mimeType = 'application/text') {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        window.downloadStaticConfig = function(countryCode) {
            const config = STATIC_CONFIGS[countryCode];
            if (config) {
                downloadFile(config, `AWG_${countryCode}.conf`, 'application/x-wireguard-profile');
            } else {
                console.error('Config not found');
            }
        };

        async function generateConfig(configType, buttonId) {
            const button = document.getElementById(buttonId);
            const buttonText = button.querySelector('.button__text');
            const originalText = buttonText.textContent;
            
            button.disabled = true;
            button.classList.add("button--loading");
            await new Promise(resolve => setTimeout(resolve, 800));

            try {
                const deviceType = configType === 1 ? 'PC' : 'Mobile';
                const interfaceSection = `[Interface]
PrivateKey = ${generateFakeKey(44)} 
Address = 10.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 254) + 1}/24
DNS = 1.1.1.1, 8.8.8.8
MTU = 1420
Jc = 4
Jmin = 40
Jmax = 70
S1 = ${Math.floor(Math.random() * 100) + 50}
S2 = ${Math.floor(Math.random() * 100) + 50}
H1 = ${Math.floor(Math.random() * 1000000000)}
H2 = ${Math.floor(Math.random() * 1000000000)}
H3 = ${Math.floor(Math.random() * 1000000000)}
H4 = ${Math.floor(Math.random() * 1000000000)}`;

                const peerSection = `[Peer]
PublicKey = ${generateFakeKey(44)}
PresharedKey = ${generateFakeKey(44)}
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
Endpoint = dyn-${deviceType.toLowerCase()}.amneziawg.net:${Math.floor(Math.random() * 10000) + 10000}`;

                const fullConfig = `${interfaceSection}\n\n${peerSection}`;
                const moscowTime = getMoscowTimeString();
                const devicePrefix = configType === 1 ? 'PC' : 'Mob';
                const fileName = `AWG_${devicePrefix}_${moscowTime}.conf`;
                downloadFile(fullConfig, fileName, 'application/x-wireguard-profile');
                
                buttonText.textContent = `✅ Готово!`;
                setTimeout(() => buttonText.textContent = originalText, 2000);
            } catch (error) {
                console.error(error);
                buttonText.textContent = `❌ Ошибка`;
                setTimeout(() => buttonText.textContent = originalText, 2000);
            } finally {
                button.disabled = false;
                button.classList.remove("button--loading");
            }
        }

        function generateFakeKey(length = 44) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        document.getElementById('generateButton1').onclick = () => generateConfig(1, 'generateButton1');
        document.getElementById('generateButton2').onclick = () => generateConfig(2, 'generateButton2');

        // ripple effect
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(0, 255, 100, 0.2)';
                ripple.style.width = '10px';
                ripple.style.height = '10px';
                ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                ripple.style.animation = 'ripple 0.6s ease-out';
                ripple.style.left = e.clientX - card.getBoundingClientRect().left + 'px';
                ripple.style.top = e.clientY - card.getBoundingClientRect().top + 'px';
                card.style.position = 'relative';
                card.style.overflow = 'hidden';
                card.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: translate(-50%, -50%) scale(30);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
